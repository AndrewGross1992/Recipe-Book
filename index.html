<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Recipe Book</title>
    <style>
        /* General page styling */
        body { 
            font-family: 'Courier New', Courier, monospace; 
            padding: 20px; 
            background-color: #f4f4f9; 
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { color: #333; text-align: center; }

        /* Input area */
        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-bottom: 30px; 
        }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        button { 
            padding: 12px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
        }

        /* The Recipe Notecard Look */
        .recipe-card { 
            background: #fff; 
            padding: 20px; 
            margin-bottom: 20px;
            border-radius: 5px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border: 1px solid #ccc;
            /* Lined paper effect */
            background-image: linear-gradient(#e0e0e0 1px, transparent 1px);
            background-size: 100% 1.5em;
            line-height: 1.5em;
        }
        .recipe-card h3 { 
            text-decoration: underline; 
            margin-top: 0; 
            padding-bottom: 0.5em;
        }
        ul { list-style-type: none; padding-left: 0; }
        li { padding-bottom: 0.5em; }
    </style>
</head>
<body>

    <h1>My Recipe Book</h1>

    <div class="input-group">
        <input type="text" id="recipeUrl" placeholder="Paste recipe URL here...">
        <button onclick="fetchRecipe()">Extract & Save</button>
    </div>

    <div id="recipe-container">
        <!-- Recipes will appear here as notecards -->
    </div>

     /* add script run code here again */
</body>
</html>
